remote_theme: giellalt/jekyll-theme-giellalt@main
title: Viena Karelian NLP Grammar
description: Finite state and Constraint Grammar based analysers, proofing tools and language resources for the Viena Karelian language
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji

defaults:
  - scope: { path: "" }
    values:
      layout: default

markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    disable: true
